<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Edulink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="global.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 transition-colors duration-500" id="body-bg">

    <div class="bg-white w-full max-w-[1000px] flex rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        
        <div id="banner-side" class="hidden md:flex md:w-1/2 bg-blue-600 p-12 flex-col justify-between text-white relative overflow-hidden transition-colors duration-500">
            <div class="relative z-10">
                <h1 class="text-4xl font-black italic tracking-tighter">EduLink</h1>
                <p id="teks-banner" class="mt-4 text-blue-100 leading-relaxed">Sistem manajemen kelas masa depan dengan dukungan kecerdasan buatan.</p>
            </div>
            
            <div class="relative z-10">
                <blockquote class="italic text-sm text-blue-200">"Pendidikan adalah senjata paling mematikan di dunia..."</blockquote>
            </div>

            <div class="absolute -right-16 -bottom-16 w-64 h-64 bg-white/10 rounded-full opacity-50"></div>
            <div class="absolute -left-10 -top-10 w-40 h-40 bg-white/10 rounded-full opacity-50"></div>
        </div>

        <div class="w-full md:w-1/2 p-10 md:p-16 relative">
            <div class="mb-8">
                <h2 id="judul-form" class="text-3xl font-bold text-slate-800">Selamat Datang</h2>
                <p id="sub-judul-form" class="text-slate-500 mt-2">Masuk untuk melanjutkan ke portal kamu.</p>
            </div>

            <form onsubmit="handleAuth(event)" class="space-y-5">
                
                <div class="flex bg-slate-100 p-1 rounded-xl gap-1 mb-2">
                    <button type="button" onclick="setRole('mhs')" id="role-mhs" class="flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600">MAHASISWA</button>
                    <button type="button" onclick="setRole('dsn')" id="role-dsn" class="flex-grow py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-blue-600">DOSEN</button>
                </div>

                <div id="field-nama" class="hidden overflow-hidden transition-all duration-300">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Nama Lengkap</label>
                    <input type="text" id="user-name" placeholder="Masukkan nama lengkap" 
                        class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold text-sm">
                </div>

                <div>
                    <label id="label-id" class="text-xs font-black text-slate-400 uppercase tracking-widest">Nomor Induk Mahasiswa (NIM)</label>
                    <input type="text" id="user-id" required placeholder="Masukkan NIM kamu" 
                        class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold tracking-widest text-sm">
                </div>

                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Kata Sandi</label>
                    <input type="password" id="user-pass" required placeholder="••••••••" 
                        class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition text-sm">
                </div>

                <div id="field-konfirmasi-pass" class="hidden overflow-hidden transition-all duration-300">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Konfirmasi Kata Sandi</label>
                    <input type="password" id="user-pass-confirm" placeholder="Ulangi kata sandi" 
                        class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition text-sm">
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 mt-4">
                    Masuk ke Portal
                </button>
            </form>

            <div class="mt-8 text-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p id="teks-toggle" class="text-xs text-slate-500 font-medium">
                    Belum punya akun? <button onclick="toggleMode()" type="button" class="text-blue-600 font-bold hover:underline ml-1">Daftar sekarang</button>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ========== CONFIG FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCbPRP947C2OwPMaLSqWfbFCOLEkBBrx8c",
            authDomain: "edulink-v2.firebaseapp.com",
            databaseURL: "https://edulink-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edulink-v2",
            storageBucket: "edulink-v2.firebasestorage.app",
            messagingSenderId: "450247433954",
            appId: "1:450247433954:web:c3875535c4d1edc9a388bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ========== FUNGSI HASH SEDERHANA ==========
        function simpleHash(str) {
            let hash = 0;
            if (str.length === 0) return hash;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; 
            }
            return Math.abs(hash).toString(16); 
        }

        // ========== VARIABEL STATE ==========
        let currentRole = 'mhs';
        let isLoginMode = true; 

        // ========== FUNGSI GANTI ROLE ==========
        window.setRole = function(role) {
            currentRole = role;
            const btnMhs = document.getElementById('role-mhs');
            const btnDsn = document.getElementById('role-dsn');
            const label = document.getElementById('label-id');
            const input = document.getElementById('user-id');
            const btnSubmit = document.getElementById('btn-submit');
            const bannerSide = document.getElementById('banner-side');

            if (role === 'mhs') {
                btnMhs.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600";
                btnDsn.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-blue-600";
                label.innerText = "Nomor Induk Mahasiswa (NIM)";
                input.placeholder = "Masukkan NIM kamu";
                btnSubmit.className = "w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 mt-4";
                bannerSide.classList.replace('bg-indigo-600', 'bg-blue-600');
            } else {
                btnDsn.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-indigo-600";
                btnMhs.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-indigo-600";
                label.innerText = "Nomor Induk Dosen (NIDN)";
                input.placeholder = "Masukkan NIDN kamu";
                btnSubmit.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 mt-4";
                bannerSide.classList.replace('bg-blue-600', 'bg-indigo-600');
            }
        };

        // ========== FUNGSI TOGGLE LOGIN / REGISTER ==========
        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            
            const judul = document.getElementById('judul-form');
            const subJudul = document.getElementById('sub-judul-form');
            const fieldNama = document.getElementById('field-nama');
            const fieldKonfirmasi = document.getElementById('field-konfirmasi-pass');
            const inputNama = document.getElementById('user-name');
            const inputPass = document.getElementById('user-pass');
            const inputPassConfirm = document.getElementById('user-pass-confirm');
            const btnSubmit = document.getElementById('btn-submit');
            const teksToggle = document.getElementById('teks-toggle');

            if (isLoginMode) {
                judul.innerText = "Selamat Datang";
                subJudul.innerText = "Masuk untuk melanjutkan ke portal kamu.";
                fieldNama.classList.add('hidden');
                fieldKonfirmasi.classList.add('hidden');
                inputNama.removeAttribute('required');
                inputPassConfirm.removeAttribute('required');
                inputPass.value = ''; 
                btnSubmit.innerText = "Masuk ke Portal";
                teksToggle.innerHTML = `Belum punya akun? <button onclick="toggleMode()" type="button" class="text-blue-600 font-bold hover:underline ml-1">Daftar sekarang</button>`;
            } else {
                judul.innerText = "Daftar Akun";
                subJudul.innerText = "Bergabung dengan EduLink hari ini.";
                fieldNama.classList.remove('hidden');
                fieldKonfirmasi.classList.remove('hidden');
                inputNama.setAttribute('required', 'true');
                inputPassConfirm.setAttribute('required', 'true');
                btnSubmit.innerText = "Daftar Sekarang 🚀";
                teksToggle.innerHTML = `Sudah punya akun? <button onclick="toggleMode()" type="button" class="text-blue-600 font-bold hover:underline ml-1">Masuk di sini</button>`;
            }
        };

        // ========== FUNGSI UTAMA (HANDLE LOGIN & REGISTER KE AWAN) ==========
        window.handleAuth = async function(event) {
            event.preventDefault(); 

            const inputID = document.getElementById('user-id').value.trim();
            const inputPassword = document.getElementById('user-pass').value;
            const btnSubmit = document.getElementById('btn-submit');
            const teksAsliTombol = btnSubmit.innerText;

            btnSubmit.innerText = "Memeriksa Server... ⏳";
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70', 'cursor-wait');

            try {
                if (isLoginMode) {
                    // ==============================
                    // LOGIKA LOGIN (CEK KE FIREBASE)
                    // ==============================
                    if (!inputPassword) {
                        alert("Harap masukkan password!");
                        resetTombol();
                        return;
                    }
                    
                    const dbPath = `users/${currentRole}/${inputID}`;
                    const snapshot = await get(ref(db, dbPath));

                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        const inputPasswordHash = simpleHash(inputPassword);

                        if (userData.password_hash === inputPasswordHash) {
                            // Bikin Sesi Lokal
                            const tujuan = currentRole === 'mhs' ? 'dashboard.html' : 'dosen.html';
                            const roleText = currentRole === 'mhs' ? 'mahasiswa' : 'dosen';
                            
                            localStorage.setItem('user_id', inputID);
                            localStorage.setItem('user_nama', userData.nama);
                            localStorage.setItem('user_role', roleText);
                            
                            alert(`✅ Login berhasil! Selamat datang, ${userData.nama}`);
                            btnSubmit.innerText = "Mengalihkan... 🚀";
                            setTimeout(() => { window.location.href = tujuan; }, 500);
                        } else {
                            alert("❌ Password salah! Silakan coba lagi.");
                            resetTombol();
                        }
                    } else {
                        // Cek apakah dia nyasar ke role sebelah
                        const otherRole = currentRole === 'mhs' ? 'dsn' : 'mhs';
                        const otherPath = `users/${otherRole}/${inputID}`;
                        const otherSnapshot = await get(ref(db, otherPath));

                        if (otherSnapshot.exists()) {
                            alert(`⚠️ Akun tidak ditemukan di role ini, tapi terdaftar sebagai ${otherRole === 'mhs' ? 'MAHASISWA' : 'DOSEN'}. Silakan ganti pilihan role di atas!`);
                        } else {
                            alert("❌ Akun tidak ditemukan! Silakan daftar terlebih dahulu.");
                        }
                        resetTombol();
                    }

                } else {
                    // ==============================
                    // LOGIKA REGISTER (SIMPAN KE FIREBASE)
                    // ==============================
                    const inputNama = document.getElementById('user-name').value.trim();
                    const inputPasswordConfirm = document.getElementById('user-pass-confirm').value;
                    
                    if (!inputNama) return alert("Harap masukkan nama lengkap!"), resetTombol();
                    if (inputPassword.length < 4) return alert("Password minimal 4 karakter!"), resetTombol();
                    if (inputPassword !== inputPasswordConfirm) return alert("Password tidak cocok!"), resetTombol();
                    
                    // Cek apakah ID udah dipakai
                    const dbPath = `users/${currentRole}/${inputID}`;
                    const snapshot = await get(ref(db, dbPath));

                    if (snapshot.exists()) {
                        alert("❌ ID ini sudah terdaftar! Silakan kembali ke menu Masuk.");
                        resetTombol();
                        return;
                    }

                    // Kalau aman, simpan ke Firebase
                    await set(ref(db, dbPath), {
                        nama: inputNama,
                        password_hash: simpleHash(inputPassword),
                        waktu_daftar: Date.now()
                    });

                    alert("🎉 Pendaftaran berhasil! Silakan login dengan password Anda.");
                    window.toggleMode(); 
                    document.getElementById('user-pass').value = ''; 
                    document.getElementById('user-pass-confirm').value = '';
                    document.getElementById('user-name').value = '';
                    resetTombol();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("Terjadi kesalahan koneksi ke server. Coba lagi nanti.");
                resetTombol();
            }

            function resetTombol() {
                btnSubmit.innerText = teksAsliTombol;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70', 'cursor-wait');
            }
        };
    </script>
</body>
</html>
