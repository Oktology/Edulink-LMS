<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Kelas Baru | EduLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animasi untuk tombol warna yang terpilih */
        .color-active {
            transform: scale(1.2);
            outline: 3px solid #6366f1; /* Indigo-500 */
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-[1000px] flex-col rounded-[40px] shadow-2xl border border-slate-200 overflow-hidden mx-auto">
    <div class="bg-indigo-600 p-8 text-white">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">Buat Kelas Baru</h1>
        <p class="text-indigo-100 text-[10px] mt-1 uppercase tracking-[0.2em] font-bold">LMS Platform Panel Dosen</p>
    </div>

    <form onsubmit="simpanKelas(event)" class="p-10 space-y-6">
        
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Nama Mata Kuliah</label>
            <input type="text" id="nama-mk" required placeholder="Contoh: Pemrograman Web 2" 
                class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 transition font-bold text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
            
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Kode MK (Join Code)</label>
                <input type="text" id="kode-mk" required placeholder="WEB2-A" 
                    class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 transition font-bold uppercase text-sm">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Tingkat Semester</label>
                <div class="relative">
                    <select id="input-semester" required class="w-full p-4 pr-10 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition font-bold text-slate-700 text-sm appearance-none cursor-pointer">
                        <option value="" disabled selected>-- Pilih Semester --</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                        <option value="Pilihan">Mata Kuliah Pilihan / Umum</option>
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            
        </div> <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Hari Kuliah</label>
                <select id="input-hari-kelas" required class="w-full mt-2 bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold focus:outline-none focus:border-indigo-500 transition appearance-none cursor-pointer">
                    <option value="Senin">Senin</option>
                    <option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option>
                    <option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option>
                    <option value="Sabtu">Sabtu</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em]">Jam Mulai</label>
                <input type="time" id="input-jam-kelas" required class="w-full mt-2 bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold focus:outline-none focus:border-indigo-500 transition">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Warna Tema Kelas</label>
            <div id="color-picker" class="flex gap-4 mt-3 ml-2">
                <button type="button" onclick="pilihWarna('bg-blue-600', this)" class="color-btn w-9 h-9 rounded-full bg-blue-600 border-2 border-white shadow-md transition-all color-active ring-2 ring-blue-400 ring-offset-2"></button>
                <button type="button" onclick="pilihWarna('bg-indigo-600', this)" class="color-btn w-9 h-9 rounded-full bg-indigo-600 border-2 border-white shadow-md transition-all"></button>
                <button type="button" onclick="pilihWarna('bg-purple-600', this)" class="color-btn w-9 h-9 rounded-full bg-purple-600 border-2 border-white shadow-md transition-all"></button>
                <button type="button" onclick="pilihWarna('bg-emerald-600', this)" class="color-btn w-9 h-9 rounded-full bg-emerald-600 border-2 border-white shadow-md transition-all"></button>
                <button type="button" onclick="pilihWarna('bg-rose-600', this)" class="color-btn w-9 h-9 rounded-full bg-rose-600 border-2 border-white shadow-md transition-all"></button>
            </div>
        </div>

        <div class="pt-6 flex items-center gap-4">
            <a href="dosen.html" class="flex-grow text-center py-4 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-slate-600 transition">Batal</a>
            <button type="submit" class="w-2/3 bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] hover:bg-indigo-600 transition-all shadow-xl active:scale-95">
                Terbitkan Kelas
            </button>
        </div>

    </form>
</div>

    <script type="module">
    // 1. Import tools yang kita butuhin
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 2. Config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCbPRP947C2OwPMaLSqWfbFCOLEkBBrx8c",
        authDomain: "edulink-v2.firebaseapp.com",
        databaseURL: "https://edulink-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "edulink-v2",
        storageBucket: "edulink-v2.firebasestorage.app",
        messagingSenderId: "450247433954",
        appId: "1:450247433954:web:c3875535c4d1edc9a388bb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let temaTerpilih = "bg-blue-600";

    // Kita tempel ke window biar bisa dipanggil dari tombol HTML
    window.pilihWarna = (warna, elemen) => {
        temaTerpilih = warna;
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('color-active', 'ring-2', 'ring-offset-2', 'ring-blue-400', 'ring-indigo-400', 'ring-purple-400', 'ring-emerald-400', 'ring-rose-400'));
        
        // Tambahin ring effect ke tombol yang dipilih biar UI makin manis
        elemen.classList.add('color-active', 'ring-2', 'ring-offset-2');
        if(warna.includes('blue')) elemen.classList.add('ring-blue-400');
        if(warna.includes('indigo')) elemen.classList.add('ring-indigo-400');
        if(warna.includes('purple')) elemen.classList.add('ring-purple-400');
        if(warna.includes('emerald')) elemen.classList.add('ring-emerald-400');
        if(warna.includes('rose')) elemen.classList.add('ring-rose-400');
    };

    window.simpanKelas = async function(event) {
        event.preventDefault();
        
        const kodeInput = document.getElementById('kode-mk').value.toUpperCase();
        const namaMK = document.getElementById('nama-mk').value;
        const hariMK = document.getElementById('input-hari-kelas').value;
        const jamMK = document.getElementById('input-jam-kelas').value;
        const namaDosen = localStorage.getItem('user_nama') || "Dosen Pengampu";

        const kelasBaru = {
            nama: namaMK,
            kode: kodeInput,
            semester: document.getElementById('input-semester').value, // <-- INI YANG DIBENERIN
            hari: hariMK,
            jam_mulai: jamMK,
            tema: temaTerpilih,
            dosen: namaDosen,
            joinCode: kodeInput 
        };

        try {
            // --- A. SIMPAN KE LOCALSTORAGE (Untuk Dashboard Dosen) ---
            let listKelas = JSON.parse(localStorage.getItem('database_kelas')) || [];
            if (listKelas.some(k => k.joinCode === kodeInput)) return alert("❌ Kode MK sudah terpakai!");
            
            listKelas.push(kelasBaru);
            localStorage.setItem('database_kelas', JSON.stringify(listKelas));

            // --- B. KIRIM KE FIREBASE CLOUD (Kunci Biar Mahasiswa Bisa Liat) ---
            
            // 1. Simpan Informasi Kelas Global
            await set(ref(db, `database_kelas/${kodeInput}`), kelasBaru);

            // 2. Simpan Jadwal Khusus
            await set(ref(db, `jadwal/${kodeInput}`), {
                hari: hariMK,
                jam_mulai: jamMK,
                jam_selesai: "--:--", 
                dosen: namaDosen
            });

            alert(`✅ Kelas ${namaMK} & Jadwal berhasil diterbitkan ke Cloud!`);
            window.location.href = 'dosen.html';

        } catch (error) {
            console.error(error);
            alert("Gagal konek ke Cloud, cek internet!");
        }
    };
</script>
</body>
</html>
