<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Saya | EduLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #sidebar { transition: all 0.3s ease-in-out; min-width: 260px; max-width: 260px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside id="sidebar" class="bg-slate-900 text-white flex flex-col h-full shadow-2xl z-50">
        <div class="p-6">
            <h1 class="text-2xl font-black text-blue-400 tracking-tighter italic">EduLink</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">LMS Platform</p>
        </div>
        <nav class="px-4 space-y-2 mt-4">
            <a href="dashboard.html" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl font-bold text-xs transition">
                <span>🏠</span> Beranda
            </a>
            <a href="tugas.html" class="flex items-center justify-between p-3 bg-blue-600 text-white rounded-xl text-xs font-bold transition">
                <div class="flex items-center gap-3"><span>📝</span> Tugas Saya</div>
            </a>
            
            <a href="jadwal.html" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl text-xs transition">
                <span>📅</span> Jadwal Kuliah
            </a>
        </nav>
        <div class="flex-grow px-4 mt-8 overflow-hidden flex flex-col">
            <p class="px-3 text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 italic">Daftar Kelas Saya</p>
            <div id="daftar-kelas-sidebar" class="space-y-1 overflow-y-auto max-h-72"></div>
        </div>
        <div class="mt-auto border-t border-slate-800 p-4 text-center">
            <button onclick="logout()" class="w-full p-3 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white rounded-xl text-xs font-bold transition">🚪 Keluar</button>
        </div>
    </aside>

    <div class="flex-grow flex flex-col min-w-0 overflow-y-auto">
        <main class="p-8">
            <div class="max-w-4xl mx-auto">
                <div class="mb-10">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Tugas Saya</h1>
                    <p class="text-xs text-slate-400 mt-1 font-bold uppercase tracking-widest">Pantau semua progres akademikmu!</p>
                </div>

                <div id="daftar-tugas-global" class="space-y-4">
                    <div class="text-center py-20">
                        <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sinkronisasi Semua Kelas...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
  }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue } from "firebase/database";

    // 1. Config Firebase Langsung
    const firebaseConfig = {
        apiKey: "AIzaSyCbPRP947C2OwPMaLSqWfbFCOLEkBBrx8c",
        authDomain: "edulink-v2.firebaseapp.com",
        databaseURL: "https://edulink-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "edulink-v2",
        storageBucket: "edulink-v2.firebasestorage.app",
        messagingSenderId: "450247433954",
        appId: "1:450247433954:web:c3875535c4d1edc9a388bb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.muatSemuaTugas = function() {
        const container = document.getElementById('daftar-tugas-global');
        const kelasSaya = JSON.parse(localStorage.getItem('kelas_mahasiswa')) || [];
        
        if (kelasSaya.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 px-10 bg-white rounded-[40px] border-2 border-dashed border-slate-100">
                    <div class="text-4xl mb-4">🏫</div>
                    <h3 class="text-slate-800 font-black text-lg">Belum Join Kelas</h3>
                    <p class="text-slate-400 text-[10px] font-bold uppercase mt-2">Join kelas dulu di beranda ya!</p>
                </div>`;
            return;
        }

        let semuaTugas = [];
        let diproses = 0;

        kelasSaya.forEach(kelas => {
            const kode = kelas.kode || kelas.joinCode;
            onValue(ref(db, 'tugas/' + kode), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    Object.keys(data).forEach(id => {
                        semuaTugas.push({
                            id: id,
                            namaKelas: kelas.nama,
                            kodeKelas: kode,
                            tema: kelas.tema,
                            ...data[id]
                        });
                    });
                }
                diproses++;
                // Render ketika semua kelas sudah selesai dicek
                if (diproses === kelasSaya.length) {
                    renderTugas(semuaTugas);
                }
            }, { onlyOnce: true });
        });
    };

    window.renderTugas = function(listTugas) {
        const container = document.getElementById('daftar-tugas-global');
        
        if (listTugas.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 px-10 bg-white rounded-[40px] border-2 border-dashed border-slate-100">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6 text-3xl shadow-inner">☕</div>
                    <h3 class="text-slate-800 font-black text-lg tracking-tight">Santai Dulu!</h3>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Belum ada tugas yang perlu dikerjain nih.</p>
                </div>`;
            return;
        }

        // Urutkan tugas terbaru
        listTugas.sort((a, b) => new Date(b.waktu) - new Date(a.waktu));

        let html = "";
        listTugas.forEach(t => {
            const sudahSelesai = localStorage.getItem(`tugas_selesai_${t.id}`) === 'true';
            
            html += `
                <div class="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6 group hover:border-blue-500 transition-all">
                    <div class="flex items-center gap-5 w-full">
                        <div class="w-14 h-14 ${t.tema || 'bg-blue-600'} rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-black text-xs shadow-lg uppercase">
                            ${t.kodeKelas ? t.kodeKelas.substring(0,2) : '??'}
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${t.namaKelas}</p>
                            <h3 class="text-sm font-bold text-slate-800 truncate">${t.judul}</h3>
                            <p class="text-[10px] text-slate-400 font-medium tracking-tight">📅 Deadline: ${t.deadline || '-'}</p>
                        </div>
                    </div>
                    <div class="w-full md:w-auto">
                        ${sudahSelesai 
                            ? `<div class="px-8 py-3 bg-emerald-50 text-emerald-600 rounded-2xl text-[10px] font-black uppercase text-center border border-emerald-100 min-w-[140px]">SELESAI ✅</div>`
                            : `<button onclick="pindahKeKelas('${t.namaKelas}')" class="w-full px-8 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition shadow-lg min-w-[140px]">Kerjakan</button>`
                        }
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    };

    window.pindahKeKelas = (namaKelas) => {
        localStorage.setItem('kelasAktif', namaKelas);
        window.location.href = 'kelas.html';
    };

    // Jalankan saat load
    window.onload = function() {
        muatSemuaTugas();
        // Panggil fungsi sidebar jika ada
        if (typeof window.tampilkanKelasSidebar === "function") window.tampilkanKelasSidebar();
    };
</script>
</body>
</html>
