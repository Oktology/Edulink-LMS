<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal | EduLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #sidebar { transition: all 0.3s ease-in-out; min-width: 260px; max-width: 260px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside id="sidebar" class="bg-slate-900 text-white flex flex-col h-full shadow-2xl z-50">
    <div class="p-6">
        <h1 class="text-2xl font-black text-blue-400 tracking-tighter italic">EduLink</h1>
        <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">LMS Platform</p>
    </div>

    <nav class="px-4 space-y-2 mt-4">
        <a href="dashboard.html" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl font-bold text-xs transition">
            <span>🏠</span> Beranda
        </a>

        <a href="tugas.html" class="flex items-center justify-between p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl text-xs transition group">
            <div class="flex items-center gap-3">
                <span>📝</span> Tugas Saya
            </div>
        </a>

       

        <a href="jadwal.html" class="flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold text-xs transition">
            <span>📅</span> Jadwal Kuliah
        </a>

    </nav>

    <div class="flex-grow px-4 mt-8 overflow-hidden flex flex-col">
        <p class="px-3 text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 italic">Daftar Kelas Saya</p>
        <div id="daftar-kelas-sidebar" class="space-y-1 overflow-y-auto max-h-72 custom-scrollbar">
            </div>
    </div>

    <div class="mt-auto border-t border-slate-800 bg-slate-950/30">
        <div id="sidebar-user-info" class="p-4 flex flex-col gap-1">
            <p id="profile-name-side" class="text-xs font-black text-white italic">--</p>
            <p id="profile-id-side" class="text-[9px] text-slate-500 font-bold tracking-tighter uppercase">NIM: --</p>
        </div>
        <div class="p-4 pt-0">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-3 p-3 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white rounded-xl text-xs font-bold transition">
                <span>🚪</span> Keluar Dashboard
            </button>
        </div>
    </div>
</aside>

        <main class="p-8 overflow-y-auto">
    <div class="max-w-5xl mx-auto">
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Jadwal Kuliah</h1>
            <p class="text-xs text-slate-400 mt-1 font-bold uppercase tracking-widest italic">Jangan sampe telat masuk kelas! ⏰</p>
        </div>

        <div id="container-jadwal" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 1. Firebase Config (Gunakan config yang sama)
    const firebaseConfig = {
        apiKey: "AIzaSyCbPRP947C2OwPMaLSqWfbFCOLEkBBrx8c",
        authDomain: "edulink-v2.firebaseapp.com",
        databaseURL: "https://edulink-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "edulink-v2",
        storageBucket: "edulink-v2.firebasestorage.app",
        messagingSenderId: "450247433954",
        appId: "1:450247433954:web:c3875535c4d1edc9a388bb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- FUNGSI UTAMA: TARIK JADWAL DARI FIREBASE ---
    window.muatJadwal = async function() {
        const container = document.getElementById('container-jadwal');
        const kelasSaya = JSON.parse(localStorage.getItem('kelas_mahasiswa')) || [];

        if (kelasSaya.length === 0) {
            container.innerHTML = `
                <div class="col-span-full p-20 text-center bg-white rounded-[40px] border-2 border-dashed border-slate-100">
                    <p class="text-slate-400 italic text-[10px] font-black uppercase tracking-widest">Belum ada kelas yang diikuti!</p>
                </div>`;
            return;
        }

        let semuaJadwal = [];
        
        // Loop setiap kelas untuk ambil jadwalnya di Firebase
        const promises = kelasSaya.map(async (kelas) => {
            const kode = kelas.kode || kelas.joinCode;
            // Ganti path-nya supaya masuk ke database_kelas dulu
            const jadwalRef = ref(db, `database_kelas/${kode}`);
            
            try {
                const snapshot = await get(jadwalRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    semuaJadwal.push({
                        ...data,
                        namaKelas: kelas.nama,
                        tema: kelas.tema,
                        kode: kode
                    });
                }
            } catch (err) {
                console.error("Gagal tarik jadwal kelas " + kode, err);
            }
        });

        await Promise.all(promises);
        renderJadwal(semuaJadwal);
    };

    // --- FUNGSI RENDER: TAMPILIN KE UI ---
    window.renderJadwal = function(jadwalArray) {
        const container = document.getElementById('container-jadwal');
        
        if (jadwalArray.length === 0) {
            container.innerHTML = `
                <div class="col-span-full p-20 text-center bg-white rounded-[40px] border-2 border-dashed border-slate-100">
                    <p class="text-3xl mb-4">📅</p>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Jadwal belum diatur oleh dosen!</p>
                </div>`;
            return;
        }

        // Urutkan berdasarkan hari (Senin -> Minggu)
        const urutanHari = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"];
        jadwalArray.sort((a, b) => urutanHari.indexOf(a.hari) - urutanHari.indexOf(b.hari));

        let html = "";
        jadwalArray.forEach(j => {
            html += `
                <div class="bg-white rounded-[32px] border border-slate-200 p-8 shadow-sm hover:shadow-xl transition-all group border-b-[6px] ${j.tema || 'border-b-blue-600'}">
                    <div class="flex justify-between items-start mb-6">
                        <span class="px-4 py-1.5 bg-slate-100 text-slate-600 rounded-xl text-[9px] font-black uppercase tracking-widest">${j.hari || 'HARI'}</span>
                        <div class="text-right">
                             <p class="text-[10px] font-black text-slate-800 tracking-tighter">${j.jam_mulai || '--:--'} - ${j.jam_selesai || '--:--'}</p>
                             <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Waktu Kuliah</p>
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-black text-slate-800 leading-tight mb-8 uppercase tracking-tighter">${j.namaKelas}</h3>
                    
                    <div class="space-y-4 mb-10">
                        <div class="flex items-center gap-4 px-2">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-xs border-2 border-white shadow-sm">👤</div>
                            <div>
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em]">Dosen Pengampu</p>
                                <p class="text-[10px] font-bold text-slate-600">${j.dosen || 'Dosen Pengampu'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-50 flex justify-between items-center">
                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${j.kode}</p>
                        <button onclick="localStorage.setItem('kelasAktif', '${j.namaKelas}'); window.location.href='kelas.html'" 
                            class="px-6 py-3 bg-slate-900 text-white text-[9px] font-black uppercase rounded-2xl hover:bg-blue-600 transition shadow-lg">
                            Masuk Kelas
                        </button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    };

    // Jalankan saat halaman dibuka
    window.muatJadwal();
</script>
</body>
</html>
